name: Feature request
description: Suggest an idea for OrbitalEdge
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have a great idea for OrbitalEdge? Share it here!
  - type: textarea
    id: feature-description
    attributes:
      label: Describe the feature
      description: A clear and concise description of what you want to happen.
      placeholder: I want to see...
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: What is the use case?
      description: Why would this be useful?
  - type: checkboxes
    id: alternatives
    attributes:
      label: Have you considered alternatives?
      options:
        - label: I've looked at other libraries (like AstroPy) but they are too heavy/online-dependent.
          required: false
